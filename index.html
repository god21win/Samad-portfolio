<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdul Samad Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
    </header>
    <div class="terminal-card">
        <p>Terminal Interaction Simulation</p>
    </div>
    <section class="bento-grid">
        <div class="item">Project 1</div>
        <div class="item">Project 2</div>
        <div class="item">Project 3</div>
    </section>
    <section class="timeline">
        <h2>Career Timeline</h2>
        <div class="timeline-item">Item 1</div>
    </section>
    <section class="education">
        <h2>Education</h2>
        <p>Degree details</p>
    </section>
    <section class="contact-form">
        <h2>Contact Me</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2026 Abdul Samad</p>
    </footer>
</body>
</html>
